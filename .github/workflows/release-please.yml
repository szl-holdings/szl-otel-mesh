name: Release Please

# Automated changelog + release-PR management via Conventional Commits.
# Reusable workflow pinned SHA: updated post package-name removal fix
# Fixed: release-type changed from "node" to "simple" — uds-mesh has no package.json
# Fixed: removed deprecated package-name input (release-please-action v5)

# DISABLED on push (2026-06-12): release-please MUST create a release PR, but the
# enterprise currently disables "Allow GitHub Actions to create or approve pull
# requests" (Settings -> Actions -> General, enterprise-enforced). With that off,
# every push run fails with "GitHub Actions is not permitted to create or approve
# pull requests". Gated to manual dispatch so it stops failing on every push;
# re-enable the push trigger once the enterprise allows Actions PR creation.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  release-please:
    uses: szl-holdings/.github/.github/workflows/reusable-release-please.yml@main
    with:
      release-type: simple
      target-branch: main
      # Manifest-driven config registers custom commit types (doctrine:/bundle:/
      # compliance:/mesh:) so non-standard subjects in history don't crash the
      # release-please v5 parser ("unexpected token").
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
    permissions:
      contents: write
      pull-requests: write
