name: Release Please

# Automated changelog + release-PR management via Conventional Commits.
# Reusable workflow pinned SHA: c8359e53b40560f15ed5c25c3e4e1256b0536cf8 (2026-05-28)

on:
  push:
    branches: [main]

# Workflow-level permissions must include everything the reusable workflow needs.
permissions:
  contents: write       # release-please creates PRs, tags, releases
  pull-requests: write  # release-please updates the release PR body

jobs:
  release-please:
    uses: szl-holdings/.github/.github/workflows/reusable-release-please.yml@c8359e53b40560f15ed5c25c3e4e1256b0536cf8 # v1 (.github main)
    with:
      release-type: node
      package-name: uds-mesh
      target-branch: main
    permissions:
      contents: write
      pull-requests: write
