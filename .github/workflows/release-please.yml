name: Release Please

# Automated changelog + release-PR management via Conventional Commits.
# Reusable workflow pinned SHA: 1c5f538ed3b8fe284df98b453d0db94f7a600c41 (2026-05-28)

on:
  push:
    branches: [main]

# Workflow-level permissions must include everything the reusable workflow needs.
permissions:
  contents: write       # release-please creates PRs, tags, releases
  pull-requests: write  # release-please updates the release PR body

jobs:
  release-please:
    uses: szl-holdings/.github/.github/workflows/reusable-release-please.yml@1c5f538ed3b8fe284df98b453d0db94f7a600c41 # v1 (.github main)
    with:
      release-type: node
      package-name: uds-mesh
      target-branch: main
    permissions:
      contents: write
      pull-requests: write
