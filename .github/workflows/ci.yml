name: CI

# Series-A quality gate — Doctrine v6
# Validates governance files, bundle manifests, and OTEL span schemas.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-check:
    name: Docs & Governance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Verify required governance files
        run: |
          for f in README.md LICENSE SECURITY.md CODE_OF_CONDUCT.md CONTRIBUTING.md CITATION.cff; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All governance files present."
      - name: Validate CITATION.cff has ORCID
        run: |
          grep -q "0009-0001-0110-4173" CITATION.cff || { echo "CITATION.cff missing ORCID"; exit 1; }
          echo "CITATION.cff valid."
      - name: Validate bundle manifest
        run: |
          [ -f "uds-bundle.yaml" ] || { echo "uds-bundle.yaml missing"; exit 1; }
          echo "Bundle manifest present."
      - name: Validate a11oy.graph.* OTEL span schema (v17.2)
        run: |
          bash schemas/spans/test_graph_spans.sh
