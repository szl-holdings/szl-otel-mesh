name: Tests

# Runs the uds-mesh real test suite (8 test files under tests/):
#   - tests/test_span_schemas.py      (33 fns — schema validation)
#   - tests/test_formula_receipts.py  (29 fns — formula receipt DSSE)
#   - tests/test_quorum.py            (21 fns — Byzantine/PAC-Bayes quorum)
#   - tests/test_attestation_chain.py (20 fns — DSSE receipt chain)
#   - tests/test_bundle_manifests.py  (17 fns — bundle YAML validation)
#   - tests/test_otlp_bridge.py       (7 fns  — OTLP span bridge)
#   - tests/test_mesh_formulas.py     (6 fns  — BLS aggregate + Welford)
#   - tests/test_manifests.py         (4 fns  — Istio/Package manifests)
# Total: 137 test functions; pytest collects 210 items (with parametrize cases).
#
# Also adds uds_v18_24_substrate.py self-test (178 doctests + 97 assertions = 275,
# per the runtime's own "OK 275 tests" banner).
#
# HONEST COUNT: 210 collected pytest items in tests/ + 275 substrate self-test
# checks. Counts are grep-able/reproducible: `pytest tests/ --co -q` and
# `python3 uds_v18_24_substrate.py`.

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'schemas/**'
      - 'mesh/**'
      - 'extended-attestations.jsonl'
      - 'uds-bundle.yaml'
      - 'bundles/**'
      - 'uds_v18_24_substrate.py'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
      - 'schemas/**'
      - 'mesh/**'
      - 'extended-attestations.jsonl'
      - 'uds-bundle.yaml'
      - 'bundles/**'
      - 'uds_v18_24_substrate.py'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-suite:
    name: pytest — Schema + Attestation + Bundle + Mesh Formulas (76 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: pip install pytest pyyaml numpy py_ecc

      - name: Count test functions
        run: |
          COUNT=$(grep -r "def test_" tests/ | wc -l)
          echo "Test functions: $COUNT"
          echo "TEST_COUNT=$COUNT" >> "$GITHUB_ENV"

      - name: Run pytest suite
        run: python -m pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7

  substrate-self-test:
    name: uds_v18_24_substrate.py doctests + self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Count doctests and assertions
        run: |
          DOCTESTS=$(grep -c ">>>" uds_v18_24_substrate.py)
          ASSERTS=$(grep -c "^ *assert " uds_v18_24_substrate.py)
          echo "Doctests: $DOCTESTS, Assertions: $ASSERTS"

      - name: Run substrate self-test
        run: python3 uds_v18_24_substrate.py

  tests-gate:
    name: Tests Gate
    runs-on: ubuntu-latest
    needs: [pytest-suite, substrate-self-test]
    if: always()
    steps:
      - name: Check all test jobs passed
        run: |
          if [[ "${{ needs.pytest-suite.result }}" != "success" ]] || \
             [[ "${{ needs.substrate-self-test.result }}" != "success" ]]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All test jobs passed"
