# WU-2 (uds-mesh) — Istio STRICT mTLS for the 5 SZL organs.
# ADR-0001: canonical home is szl-holdings/uds-mesh. HONESTY: validated offline
# via kubeconform/`kubectl --dry-run=client`; no live Istio cluster is contacted
# in CI. Doctrine v11 — 749/14/163 — c7c0ba17.
#
# One PeerAuthentication per organ namespace enforcing mTLS mode STRICT, so every
# pod-to-pod call inside the mesh must present a valid SPIFFE mTLS identity.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: a11oy-strict-mtls
  namespace: szl-a11oy
  labels:
    app.kubernetes.io/part-of: uds-mesh
    szl.mesh/organ: a11oy
spec:
  mtls:
    mode: STRICT
