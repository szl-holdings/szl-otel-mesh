# WU-2 (uds-mesh) — Istio DestinationRule pinning ISTIO_MUTUAL TLS for traffic to
# the mesh OTLP collector and the cross-organ services. Pairs with the STRICT
# PeerAuthentication so callers actively originate mTLS rather than rely on
# permissive fallback. ADR-0001 · Doctrine v11 — 749/14/163 — c7c0ba17.
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: mesh-otlp-collector-mtls
  namespace: szl-mesh
  labels:
    app.kubernetes.io/part-of: uds-mesh
spec:
  host: mesh-otlp-collector.szl-mesh.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: organs-istio-mutual
  namespace: szl-mesh
  labels:
    app.kubernetes.io/part-of: uds-mesh
spec:
  # Wildcard over the five organ namespaces' services.
  host: "*.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 64
      http:
        http2MaxRequests: 256
        maxRequestsPerConnection: 16
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
