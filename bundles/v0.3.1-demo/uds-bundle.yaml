#
# SZL Holdings — honest single-application UDS demo bundle (v0.3.1-demo)
#
# WHY THIS FILE EXISTS
# --------------------
# This replaces the prior bundles/v0.3.1/uds-bundle.yaml, which referenced SIX
# packages that do not exist (composition-runtime, scitt-adapter, policy-gate,
# a15-homology, xoshiro-prng, k10v2-replay) under the WRONG ORG
# `ghcr.io/szl/packages/...` (SZL's org is `szl-holdings`). `uds create` against
# that file fails on the first package pull. It has been deleted in this PR.
#
# WHAT THIS BUNDLE IS
# -------------------
# One real, deployable UDS application: szl-receipts — the DSSE-wrapped audit
# receipt service. It is the only SZL workload that ships a correct UDS `Package`
# CR (SSO/authservice, Istio tenant expose, NetworkPolicy allow-rules, OTLP
# egress) and a real chart + images. It deploys on uds-core slim-dev today.
#
# ANATOMY (for readers — NOT yet wired in this bundle)
# ----------------------------------------------------
#   rosie    = the Jarvis operator console (human-facing command surface).
#   a11oy    = the policy + receipt substrate rosie commands.
#   amaru    = memory.  sentra = immune.  vessels = deployment fabric.
# The five module packages (built by the per-module zarf-build-and-sign.yml PRs)
# are NOT in this bundle: their images are unpublished (GHCR 403 on 2026-05-30)
# and they have no UDS Package CR yet, so they would run un-meshed and be blocked
# by uds-core default-deny. Wiring them into a real interconnect is the v0.4.0
# roadmap — see docs/roadmap/MESH_INTERCONNECT.md.
#
# Build:  uds create bundles/v0.3.1-demo --confirm
# Deploy: uds deploy uds-bundle-szl-receipts-demo-amd64-0.3.1.tar.zst --confirm
# Verify: uds inspect  uds-bundle-szl-receipts-demo-amd64-0.3.1.tar.zst

kind: UDSBundle
metadata:
  name: szl-receipts-demo
  version: 0.3.1
  description: >-
    Honest single-application UDS demo: the szl-receipts governance receipt
    service deployed on uds-core slim-dev. The rosie/a11oy/amaru/sentra/vessels
    mesh interconnect is roadmap (docs/roadmap/MESH_INTERCONNECT.md), not shipped.
  authors: "SZL Holdings Engineering <eng@szlholdings.com>"
  architecture: amd64

packages:
  # ── Layer 1: Zarf init — internal registry + agent ──────────────────────────
  - name: init
    repository: ghcr.io/defenseunicorns/packages/init
    ref: v0.77.0

  # ── Layer 2: UDS Core slim-dev — Istio + Pepr + Keycloak lite ───────────────
  - name: core-slim-dev
    repository: ghcr.io/defenseunicorns/packages/uds/core
    ref: 0.34.0-slim-dev
    overrides:
      keycloak:
        keycloak:
          values:
            - path: realmInitEnv.INSECURE_ADMIN_PASSWORD_GENERATION
              value: "true"

  # ── Layer 3: szl-receipts — the one real SZL application ────────────────────
  # Source of truth: szl-holdings/szl-uds-deployment packages/szl-receipts
  # (kind: ZarfPackageConfig; real chart charts/szl-receipts + namespace manifest;
  #  stock images python:3.12-slim + nginx:1.27-alpine).
  #
  # STAGED (honest): until the szl-receipts Zarf package is published to GHCR,
  # build this bundle from a local checkout of szl-uds-deployment by swapping the
  # `repository`+`ref` below for:
  #     path: ../../../szl-uds-deployment/packages/szl-receipts
  # The published-OCI form is shown so this bundle is correct once the package is
  # pushed. GHCR probe 2026-05-30: szl-receipts:0.3.1 → 403 (not yet published).
  - name: szl-receipts
    repository: ghcr.io/szl-holdings/packages/szl-receipts
    ref: 0.3.1
    overrides:
      szl-receipts:
        szl-receipts:
          variables:
            - name: DOMAIN
              description: "Cluster domain (must match UDS Core DOMAIN)"
              path: global.domain
              default: "uds.dev"
            - name: RECEIPT_HMAC_KEY
              description: "HMAC-SHA-256 signing key (base64-encoded, 32+ bytes)"
              path: server.hmacKey
              sensitive: true
            - name: RECEIPTS_REPLICAS
              description: "Receipt server replica count"
              path: server.replicas
              default: "1"
          values:
            - path: server.logLevel
              value: "info"
            - path: ingress.enabled
              value: true
            - path: ingress.host
              value: "receipts.uds.dev"
            - path: podSecurityStandard.enforce
              value: "restricted"
