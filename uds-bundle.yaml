    SZL Holdings governed-AI mesh — 5 flagship organs for Warhacker 2026.
    a11oy (policy/governance) + sentra (immune) + amaru (memory) +
    rosie (operator console) + killinchu (counter-UAS/drone defense).
    Deploys into Defense Unicorns existing UDS Core cluster (USB delivery).
