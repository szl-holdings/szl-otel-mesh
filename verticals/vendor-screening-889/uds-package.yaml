#
# uds-package.yaml — §889 vendor-screen wire (sentra).
#
# REAL: Namespace + Deployment + UDS Package CR reconciled by the UDS Operator.
# ROADMAP: inter-organ mTLS to a11oy (receipt-substrate cross-check) — NOT
# applied here; see docs/roadmap/MESH_INTERCONNECT.md.
---
apiVersion: v1
kind: Namespace
metadata:
  name: szl-sentra
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentra
  namespace: szl-sentra
  labels:
    app.kubernetes.io/name: sentra
    app.kubernetes.io/part-of: szl-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentra
    spec:
      containers:
        - name: sentra
          image: ghcr.io/szl-holdings/sentra:uds-v0.2.0
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SZL_COSIGN_PRIVATE_PEM
              valueFrom:
                secretKeyRef:
                  name: szl-receipts-signing
                  key: cosign.key
                  optional: true
---
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: szl-sentra
  namespace: szl-sentra
spec:
  network:
    expose:
      - service: sentra
        selector:
          app.kubernetes.io/name: sentra
        host: sentra
        gateway: tenant
        port: 8080
        targetPort: 8080
    allow:
      - direction: Egress
        selector:
          app.kubernetes.io/name: sentra
        remoteNamespace: szl-receipts
        remoteSelector:
          app.kubernetes.io/name: szl-receipts
        port: 8080
        description: "DSSE verdict-receipt egress"
  sso:
    - name: SZL sentra
      clientId: uds-szl-sentra
      redirectUris:
        - "https://sentra.uds.dev/login/generic_oauth"
  monitor:
    - selector:
        app.kubernetes.io/name: sentra
      portName: http
      targetPort: 8080
      description: "sentra metrics"
