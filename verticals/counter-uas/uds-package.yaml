#
# uds-package.yaml — counter-UAS wire (killinchu).
#
# REAL: Namespace + Deployment + UDS Package CR reconciled by the UDS Operator.
# ROADMAP: inter-organ mTLS to rosie (human-on-the-loop confirm) — NOT applied
# here; see docs/roadmap/MESH_INTERCONNECT.md.
---
apiVersion: v1
kind: Namespace
metadata:
  name: szl-killinchu
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: killinchu
  namespace: szl-killinchu
  labels:
    app.kubernetes.io/name: killinchu
    app.kubernetes.io/part-of: szl-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: killinchu
  template:
    metadata:
      labels:
        app.kubernetes.io/name: killinchu
    spec:
      containers:
        - name: killinchu
          image: ghcr.io/szl-holdings/killinchu:uds-v0.2.0
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SZL_COSIGN_PRIVATE_PEM
              valueFrom:
                secretKeyRef:
                  name: szl-receipts-signing
                  key: cosign.key
                  optional: true
---
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: szl-killinchu
  namespace: szl-killinchu
spec:
  network:
    expose:
      - service: killinchu
        selector:
          app.kubernetes.io/name: killinchu
        host: killinchu
        gateway: tenant
        port: 8080
        targetPort: 8080
    allow:
      - direction: Egress
        selector:
          app.kubernetes.io/name: killinchu
        remoteNamespace: szl-receipts
        remoteSelector:
          app.kubernetes.io/name: szl-receipts
        port: 8080
        description: "DSSE interdiction-receipt egress"
  sso:
    - name: SZL killinchu
      clientId: uds-szl-killinchu
      redirectUris:
        - "https://killinchu.uds.dev/login/generic_oauth"
  monitor:
    - selector:
        app.kubernetes.io/name: killinchu
      portName: http
      targetPort: 8080
      description: "killinchu metrics"
