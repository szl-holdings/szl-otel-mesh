        szl.mesh.organ: "killinchu"
        szl.mesh.receipt_hash: "a3f2e1d4b8c7094f6e5d2c1b0a9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a2f1a"
        szl.mesh.dsse_payload_type: "application/vnd.in-toto+json"
